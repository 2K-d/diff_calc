name: CI Pipeline

on: 
  push:
    tags:
      - '*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: cargo build --release
      - uses: softprops/action-gh-release@v3
        with:
          files: target/release/diff_calc

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: cargo build --release
      - uses: softprops/action-gh-release@v3
        with:
          files: target/release/diff_calc.exe
